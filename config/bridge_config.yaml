# Конфигурация синхронизированных каналов
# Все чаты из одного раздела будут синхронизированы между собой и с другими платформами

telegram:
  chats: 
    - "123456789"
    - "987654321"

matrix:
  rooms: 
    - "!room_id_1:matrix.org"
    - "!room_id_2:matrix.org"

teams:
  channels: 
    - "channel_id_1"
    - "channel_id_2"